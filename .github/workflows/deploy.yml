# ============================================================
# .github/workflows/deploy.yml
# Cloudflare Pages 자동 배포 (main 브랜치 push 시)
# ============================================================

name: 🚀 Cloudflare Pages 배포

on:
  push:
    branches: [main]
    paths:
      - "apps/web/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 📥 체크아웃
        uses: actions/checkout@v4

      - name: 🟢 Node.js 설정
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/web/package.json

      - name: 📦 의존성 설치
        working-directory: apps/web
        run: npm ci

      - name: 🏗 프로덕션 빌드
        working-directory: apps/web
        env:
          VITE_SUPABASE_URL:      ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_KAKAO_MAP_KEY:     ${{ secrets.VITE_KAKAO_MAP_KEY }}
          VITE_CF_WORKER_URL:     ${{ secrets.VITE_CF_WORKER_URL }}
          VITE_AD_RADIUS_METERS:  "1000"
          VITE_PINNED_AD_SLOTS:   "3"
          VITE_LUNCH_START_HOUR:  "11"
          VITE_LUNCH_END_HOUR:    "13"
        run: npm run build

      - name: ☁ Cloudflare Pages 배포
        uses: cloudflare/pages-action@v1
        with:
          apiToken:     ${{ secrets.CF_API_TOKEN }}
          accountId:    ${{ secrets.CF_ACCOUNT_ID }}
          projectName:  dosirak-escape
          directory:    apps/web/dist
          gitHubToken:  ${{ secrets.GITHUB_TOKEN }}
