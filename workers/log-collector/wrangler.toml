# ============================================================
# workers/log-collector/wrangler.toml
# ============================================================

name              = "dosirak-log-collector"
main              = "index.js"
compatibility_date = "2024-01-01"

# ── Cloudflare R2 버킷 (원본 로그 저장) ──────────────────
# 생성: npx wrangler r2 bucket create dosirak-logs
[[r2_buckets]]
binding     = "LOG_BUCKET"
bucket_name = "dosirak-logs"

# ── 환경변수 ─────────────────────────────────────────────
# npx wrangler secret put SUPABASE_URL
# npx wrangler secret put SUPABASE_ANON_KEY
[vars]
SUPABASE_URL      = ""
SUPABASE_ANON_KEY = ""

[limits]
cpu_ms = 10
